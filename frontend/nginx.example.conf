server {
    listen 80;

    # STRONGLY RECOMMENDED TO USE HTTPS IN PRODUCTION WITH A VALID CERTIFICATE
    # listen 443 ssl;
    # ADD CERTIFICATE CONFIGURATION HERE IN PRODUCTION
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;

    server_name localhost; # ADD YOUR DOMAIN HERE IN PRODUCTION
    client_max_body_size 100M;

    # Serve the static SvelteKit build
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Go gateway
    location /api/ {
        proxy_pass http://gateway:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy asset requests to RustFS
    location /assets/ {
        proxy_pass http://rustfs:9000/public-assets/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy private object requests to RustFS (presign signature validated by RustFS)
    location /private/ {
        proxy_pass http://rustfs:9000/sci-vault/;
        proxy_set_header Host rustfs:9000;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
