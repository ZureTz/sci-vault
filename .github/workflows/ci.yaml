name: CI Check

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  buf-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1.50.0
      - run: buf build
      - run: buf lint

  go-check:
    runs-on: ubuntu-latest
    needs: buf-check
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
      - run: |
          buf generate
          cd svc-gateway
          go build -v ./...
          go test ./...
          go vet ./...

  python-check:
    runs-on: ubuntu-latest
    needs: buf-check
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: astral-sh/setup-uv@v7
      - run: |
          buf generate
          cd svc-recommender
          uv sync
      - name: Ruff check
        run: |
          cd svc-recommender
          uvx ruff check .
      - name: Ruff format check
        run: |
          cd svc-recommender
          uvx ruff format --check .

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Run frontend checks
        run: |
          cd frontend
          bun run check

      - name: Build frontend
        run: |
          cd frontend
          bun run build
