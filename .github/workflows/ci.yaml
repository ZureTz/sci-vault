name: CI Check

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  buf-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: buf --version
      - run: buf build
      - run: buf lint
      - run: buf generate
      - uses: actions/upload-artifact@v6
        with:
          name: buf-generated
          path: |
            svc-gateway/internal/pb/
            svc-recommender/src/pb/

  go-check:
    runs-on: ubuntu-latest
    needs: buf-check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: buf-generated
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.0"
          cache: true
          cache-dependency-path: svc-gateway/go.sum
      - run: |
          cd svc-gateway
          go build -v ./...
          go test ./...
          go vet ./...

  python-check:
    runs-on: ubuntu-latest
    needs: buf-check
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: buf-generated
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: "true"
          cache-dependency-glob: |
            "svc-recommender/pyproject.toml",
            "svc-recommender/uv.lock",

      - run: |
          cd svc-recommender
          uv sync
      - name: Import check
        run: |
          cd svc-recommender
          uv run python -c "import main"
      - name: Ruff check
        run: |
          cd svc-recommender
          uvx ruff check .
      - name: Ruff format check
        run: |
          cd svc-recommender
          uvx ruff format --check .

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install frontend deps
        run: |
          cd frontend
          bun install

      - name: Run frontend checks
        run: |
          cd frontend
          bun run check

      - name: Build frontend
        run: |
          cd frontend
          bun run build
