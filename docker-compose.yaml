services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: sci-vault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sci_vault
      POSTGRES_PASSWORD: sci_vault_secret
      POSTGRES_DB: sci_vault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sci_vault -d sci_vault"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6-alpine
    container_name: sci-vault-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.89
    container_name: sci-vault-rustfs
    security_opt:
      - "no-new-privileges:true"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_VOLUMES=/data/rustfs{0...3}
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS=*
      - RUSTFS_ACCESS_KEY=rustfsadmin # OVERRIDE IN PRODUCTION
      - RUSTFS_SECRET_KEY=rustfsadmin # OVERRIDE IN PRODUCTION
      - RUSTFS_OBS_LOGGER_LEVEL=info
      - RUSTFS_TLS_PATH=/opt/tls
      - RUSTFS_OBJECT_CACHE_ENABLE=true
      - RUSTFS_OBJECT_CACHE_TTL_SECS=300
    volumes:
      - rustfs_data_0:/data/rustfs0
      - rustfs_data_1:/data/rustfs1
      - rustfs_data_2:/data/rustfs2
      - rustfs_data_3:/data/rustfs3
      - rustfs_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "curl -f http://127.0.0.1:9000/health && curl -f http://127.0.0.1:9001/rustfs/console/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  rustfs-volume-helper:
    image: alpine
    volumes:
      - rustfs_data_0:/data0
      - rustfs_data_1:/data1
      - rustfs_data_2:/data2
      - rustfs_data_3:/data3
      - rustfs_logs:/logs
    command: >
      sh -c "
        chown -R 10001:10001 /data0 /data1 /data2 /data3 /logs &&
        echo 'Volume Permissions fixed' &&
        exit 0
      "
    restart: "no"

  recommender:
    build:
      context: ./svc-recommender
      additional_contexts:
        - workspace_root=.
    container_name: sci-vault-recommender
    restart: unless-stopped
    ports:
      - "50051:50051"
    volumes:
      - ./svc-recommender/config.docker.yaml:/app/config.yaml:ro
    environment:
      - PG_HOST=postgres
      - PG_PORT=5432
      - REDIS_HOST=redis

  gateway:
    build:
      context: ./svc-gateway
      additional_contexts:
        - workspace_root=.
    container_name: sci-vault-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./svc-gateway/config.docker.yaml:/app/config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      recommender:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: sci-vault-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro  # Copy from nginx.example.conf
      - ./frontend/ssl:/etc/nginx/ssl:ro  # Optional: place cert.pem and key.pem here for HTTPS
    depends_on:
      - gateway

volumes:
  postgres_data:
  redis_data:
  # For RustFS
  rustfs_data_0:
  rustfs_data_1:
  rustfs_data_2:
  rustfs_data_3:
  rustfs_logs:
