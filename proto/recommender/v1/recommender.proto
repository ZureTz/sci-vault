syntax = "proto3";

package recommender.v1;

option go_package = "gateway/internal/pb/recommender";

// RecommenderService exposes operations of the recommendation engine.
service RecommenderService {
  // Health returns the liveness status of the recommender service.
  rpc Health(HealthRequest) returns (HealthResponse);

  // EnrichDocument triggers async enrichment (authors, summary, tags, embedding)
  // for the given document. Returns immediately with accepted=true; the actual
  // processing happens in the background and status is tracked via Redis.
  rpc EnrichDocument(EnrichDocumentRequest) returns (EnrichDocumentResponse);

  // TranslateText translates the given text into the target language using LLM,
  // streaming back translated chunks as they are generated.
  rpc TranslateText(TranslateTextRequest) returns (stream TranslateTextResponse);

  // SemanticSearch embeds the query text (RETRIEVAL_QUERY task type) and
  // searches for similar documents in the vector space (cosine similarity).
  // If vector similarity is sparse, fallback to keyword search based on remaining count of results to return.
  // Access control is enforced: only private docs owned by the user and
  // lab-visible docs in the given lab are considered.
  rpc SemanticSearch(SemanticSearchRequest) returns (SemanticSearchResponse);

  // RecommendSimilar returns documents most similar to a source document,
  // ranked by vector cosine similarity against the source's stored embedding.
  // The source doc is always excluded from results. Access control mirrors
  // SemanticSearch: only private docs owned by the caller and lab-visible
  // docs in the given lab are candidates.
  rpc RecommendSimilar(RecommendSimilarRequest) returns (RecommendSimilarResponse);
}

// HealthRequest is an empty message used for health check requests.
message HealthRequest {}

// HealthResponse contains the status of the recommender service.
message HealthResponse {
  // status is "ok" when the service is healthy.
  string status = 1;
  // service identifies the responding service.
  string service = 2;
}

// EnrichDocumentRequest carries the document to be enriched.
message EnrichDocumentRequest {
  // doc_id is the database primary key of the document.
  uint64 doc_id = 1;
  // file_key is the S3 object key for the uploaded PDF.
  string file_key = 2;
}

// EnrichDocumentResponse is the immediate ACK returned by the Python service.
message EnrichDocumentResponse {
  // accepted is true when the enrichment job was successfully queued.
  bool accepted = 1;
}

// TranslateTextRequest carries the text to translate and the target language.
message TranslateTextRequest {
  // text is the source text to translate.
  string text = 1;
  // target_language is the BCP-47 language tag (e.g. "zh-CN", "ja", "ko").
  string target_language = 2;
}

// TranslateTextResponse carries a chunk of translated text in a streaming response.
message TranslateTextResponse {
  // chunk is a piece of the translated text.
  string chunk = 1;
}

// SemanticSearchRequest carries the query and scope for vector similarity search.
message SemanticSearchRequest {
  // query is the natural-language search text to embed with RETRIEVAL_QUERY.
  string query = 1;
  // user_id of the requesting user (for access control on private docs).
  uint64 user_id = 2;
  // lab_id to include lab-visible documents. 0 means private-only search.
  uint64 lab_id = 3;
  // limit is the maximum number of results to return (default: 10, max: 50).
  uint32 limit = 4;
}

// MatchType indicates how a search result was found.
enum MatchType {
  MATCH_TYPE_UNSPECIFIED = 0;
  // MATCH_TYPE_SEMANTIC — matched via vector cosine similarity.
  MATCH_TYPE_SEMANTIC = 1;
  // MATCH_TYPE_KEYWORD — matched via full-text keyword search.
  MATCH_TYPE_KEYWORD = 2;
}

// SearchResult is a single document returned by semantic search.
message SearchResult {
  uint64 doc_id = 1;
  string title = 2;
  string original_file_name = 3;
  string summary = 4;
  repeated string authors = 5;
  repeated string tags = 6;
  // similarity is 1 - cosine_distance, i.e. higher = more similar.
  double similarity = 7;
  // match_type indicates whether this result came from vector or keyword search.
  MatchType match_type = 8;
}

// SemanticSearchResponse wraps the list of search results.
message SemanticSearchResponse {
  repeated SearchResult results = 1;
}

// RecommendSimilarRequest carries the source doc + access scope for the lookup.
message RecommendSimilarRequest {
  // doc_id is the source document whose embedding is used as the query vector.
  uint64 doc_id = 1;
  // user_id of the requesting user (for access control on private docs).
  uint64 user_id = 2;
  // lab_id to include lab-visible documents. 0 means private-only search.
  uint64 lab_id = 3;
  // limit is the maximum number of recommendations (default: 5, max: 20).
  uint32 limit = 4;
}

// RecommendSimilarResponse wraps the list of similar documents.
message RecommendSimilarResponse {
  repeated SearchResult results = 1;
}